apiVersion: apps/v1
kind: Deployment
metadata:
  name: scm-ai-ml
  namespace: scm-platform
  labels:
    app: scm-ai-ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scm-ai-ml
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: scm-ai-ml
      annotations:
        ad.datadoghq.com/scm-ai-ml.logs: '[{"source":"python","service":"scm-ai-ml"}]'
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: scm-ai-ml
          image: ghcr.io/ashok007-cmd/scm-platform/scm-ai-ml:tag-placeholder
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: LOG_LEVEL
              value: "INFO"
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: scm-ai-ml
  namespace: scm-platform
  labels:
    app: scm-ai-ml
spec:
  type: ClusterIP
  selector:
    app: scm-ai-ml
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scm-ai-ml-hpa
  namespace: scm-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scm-ai-ml
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
