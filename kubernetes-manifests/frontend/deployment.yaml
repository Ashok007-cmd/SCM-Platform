apiVersion: apps/v1
kind: Deployment
metadata:
  name: scm-frontend
  namespace: scm-platform
  labels:
    app: scm-frontend
    version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scm-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: scm-frontend
    spec:
      containers:
        - name: scm-frontend
          image: DOCKERHUB_USERNAME/scm-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: scm-frontend-service
  namespace: scm-platform
spec:
  selector:
    app: scm-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scm-frontend-ingress
  namespace: scm-platform
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
    - host: scm.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scm-frontend-service
                port:
                  number: 80
