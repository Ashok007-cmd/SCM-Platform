apiVersion: v1
kind: Namespace
metadata:
  name: scm-platform
  labels:
    app.kubernetes.io/managed-by: argocd
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: scm-platform-quota
  namespace: scm-platform
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: scm-platform-limits
  namespace: scm-platform
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
