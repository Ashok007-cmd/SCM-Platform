apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: scm-platform

resources:
  # Namespace & quotas (apply first)
  - namespace.yaml

  # Backend config & secrets
  - backend/configmap.yaml

  # Spring Boot backend
  - backend/deployment.yaml
  - backend/service.yaml

  # AI/ML (FastAPI + Prophet + XGBoost)
  - ai-ml/deployment.yaml

  # React frontend + ALB ingress
  - frontend/deployment.yaml

commonLabels:
  app.kubernetes.io/part-of: scm-platform
  app.kubernetes.io/managed-by: argocd
