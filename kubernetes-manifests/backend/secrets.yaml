# IMPORTANT: Do NOT store real secrets here.
# This ExternalSecret fetches values from AWS Secrets Manager at deploy time.
# Required AWS Secrets Manager path: scm-platform/backend
# Required keys: DB_PASSWORD, JWT_SECRET, DATADOG_API_KEY, KAFKA_API_SECRET
#
# To apply: ensure external-secrets-operator is installed in the cluster.
# Install: helm repo add external-secrets https://charts.external-secrets.io
#          helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: scm-backend-secrets
  namespace: scm-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: scm-backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: scm-platform/backend
        property: DB_PASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: scm-platform/backend
        property: JWT_SECRET
    - secretKey: DATADOG_API_KEY
      remoteRef:
        key: scm-platform/backend
        property: DATADOG_API_KEY
    - secretKey: KAFKA_API_SECRET
      remoteRef:
        key: scm-platform/backend
        property: KAFKA_API_SECRET
---
# ClusterSecretStore — points to AWS Secrets Manager in the deployment region
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
