apiVersion: apps/v1
kind: Deployment
metadata:
  name: scm-backend
  namespace: scm-platform
  labels:
    app: scm-backend
    version: latest
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scm-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: scm-backend
    spec:
      # Phase 5: Flyway DB Migration InitContainer
      initContainers:
        - name: flyway-migration
          image: flyway/flyway:10-alpine
          args:
            - migrate
          env:
            - name: FLYWAY_URL
              value: jdbc:postgresql://$(DB_HOST):5432/$(DB_NAME)
            - name: FLYWAY_USER
              value: scmuser
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scm-backend-secrets
                  key: DB_PASSWORD
            - name: FLYWAY_LOCATIONS
              value: filesystem:/flyway/sql
          envFrom:
            - secretRef:
                name: scm-backend-secrets
          volumeMounts:
            - name: migration-scripts
              mountPath: /flyway/sql

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: scm-backend
                topologyKey: topology.kubernetes.io/zone
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: scm-backend
          image: ghcr.io/ashok007-cmd/scm-platform/scm-backend:tag-placeholder
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: scm-backend-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5

      volumes:
        - name: migration-scripts
          configMap:
            name: flyway-migrations
