apiVersion: v1
kind: Service
metadata:
  name: scm-backend
  namespace: scm-platform
  labels:
    app: scm-backend
spec:
  type: ClusterIP
  selector:
    app: scm-backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: scm-backend-pdb
  namespace: scm-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: scm-backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scm-backend-hpa
  namespace: scm-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scm-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
