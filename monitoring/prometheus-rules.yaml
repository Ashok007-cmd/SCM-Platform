apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: scm-platform-alerts
  namespace: scm-platform
  labels:
    app: kube-prometheus-stack
    release: prometheus
spec:
  groups:
    # --------------------------------------------------------
    # Backend Service Health
    # --------------------------------------------------------
    - name: scm.backend.health
      interval: 30s
      rules:
        - alert: BackendHighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{
              namespace="scm-platform", application="scm-platform-backend",
              status=~"5.."
            }[5m]))
            /
            sum(rate(http_server_requests_seconds_count{
              namespace="scm-platform", application="scm-platform-backend"
            }[5m])) > 0.05
          for: 2m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "SCM Backend error rate > 5%"
            description: "Backend 5xx error rate is {{ humanizePercentage $value }} over last 5m."

        - alert: BackendHighLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_server_requests_seconds_bucket{
                namespace="scm-platform", application="scm-platform-backend"
              }[5m])) by (le)
            ) > 2
          for: 5m
          labels:
            severity: warning
            team: backend
          annotations:
            summary: "SCM Backend P95 latency > 2s"
            description: "P95 response time is {{ $value | humanizeDuration }}."

        - alert: BackendPodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{
              namespace="scm-platform", pod=~"scm-backend-.*"
            }[15m]) > 0
          for: 5m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "SCM Backend pod {{ $labels.pod }} is crash looping"
            description: "Pod has restarted {{ $value }} times in the last 15 minutes."

    # --------------------------------------------------------
    # AI/ML Service
    # --------------------------------------------------------
    - name: scm.aiml.health
      interval: 60s
      rules:
        - alert: AIMLServiceDown
          expr: |
            up{namespace="scm-platform", pod=~"scm-ai-ml-.*"} == 0
          for: 2m
          labels:
            severity: critical
            team: data-science
          annotations:
            summary: "SCM AI/ML service is down"
            description: "Forecast service unavailable — demand predictions will be stale."

        - alert: ForecastLatencyHigh
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{
                namespace="scm-platform", job="scm-ai-ml"
              }[5m])) by (le)
            ) > 10
          for: 5m
          labels:
            severity: warning
            team: data-science
          annotations:
            summary: "Forecast API P95 latency > 10s"
            description: "Model inference is slow: {{ $value | humanizeDuration }}."

    # --------------------------------------------------------
    # Database (RDS PostgreSQL via cloudwatch exporter)
    # --------------------------------------------------------
    - name: scm.database
      interval: 60s
      rules:
        - alert: DatabaseConnectionPoolSaturated
          expr: |
            hikaricp_connections_active{
              namespace="scm-platform"
            }
            /
            hikaricp_connections_max{
              namespace="scm-platform"
            } > 0.85
          for: 5m
          labels:
            severity: warning
            team: backend
          annotations:
            summary: "HikariCP connection pool > 85% utilized"
            description: "Pool utilization: {{ humanizePercentage $value }}. Risk of connection exhaustion."

        - alert: DatabaseQuerySlowdown
          expr: |
            rate(hikaricp_connections_timeout_total{
              namespace="scm-platform"
            }[5m]) > 0.1
          for: 3m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "Database connection timeouts occurring"
            description: "{{ $value }} connection timeouts/sec. Check RDS performance insights."

    # --------------------------------------------------------
    # Infrastructure
    # --------------------------------------------------------
    - name: scm.infrastructure
      interval: 60s
      rules:
        - alert: NodeMemoryPressure
          expr: |
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))
            * on(node) kube_node_labels{label_role="application"} > 0.85
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "EKS node memory usage > 85%"
            description: "Node {{ $labels.node }} memory: {{ humanizePercentage $value }}."

        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{
              namespace="scm-platform", reason="OOMKilled"
            } == 1
          for: 0m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod {{ $labels.pod }} OOMKilled"
            description: "Container {{ $labels.container }} was OOMKilled. Consider increasing memory limits."

    # --------------------------------------------------------
    # Business KPIs
    # --------------------------------------------------------
    - name: scm.business
      interval: 5m
      rules:
        - alert: LowStockCritical
          expr: |
            scm_inventory_quantity_available{namespace="scm-platform"}
            < scm_inventory_reorder_point{namespace="scm-platform"}
          for: 10m
          labels:
            severity: warning
            team: operations
          annotations:
            summary: "SKU {{ $labels.sku }} stock below reorder point"
            description: "Available: {{ $value }} units. Reorder point threshold reached."

        - alert: OrderFulfillmentDelayed
          expr: |
            scm_orders_pending_seconds{namespace="scm-platform"} > 86400
          for: 30m
          labels:
            severity: warning
            team: operations
          annotations:
            summary: "Orders pending fulfillment > 24 hours"
            description: "{{ $value | humanizeDuration }} since order was placed."
