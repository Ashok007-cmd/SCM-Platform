# Local development overrides for Spring Boot
# Activated via: SPRING_PROFILES_ACTIVE=local
# or: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/scm_platform
    username: scm_user
    password: dev_password

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      auto-offset-reset: earliest

  security:
    oauth2:
      resourceserver:
        jwt:
          # In local mode, bypass real OAuth — use a dev-only JWT issuer
          issuer-uri: http://localhost:8080
          jwk-set-uri: http://localhost:8080/.well-known/jwks.json

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.scmplatform: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoints:
    web:
      exposure:
        include: "*"

# Disable Datadog exporter locally
management.metrics.export.datadog.enabled: false
