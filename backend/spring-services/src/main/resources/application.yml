# SCM Platform — Spring Boot Application Configuration
spring:
  application:
    name: scm-backend

  # PostgreSQL via RDS
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/scmdb
    username: scmuser
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: scm-platform-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: latest
      properties:
        spring.json.trusted.packages: "com.scm.domain,com.scm.events"
    listener:
      ack-mode: record
      # Dead Letter Topic: failed messages routed to *.DLT after 3 retries
      # Configure @DltHandler in consumers to process DLT messages
    retry:
      topic:
        enabled: true
        attempts: 3
        delay: 1000
        multiplier: 2
        max-delay: 10000

  # Security — disable Spring auto-config for OAuth2 RS (custom JWT filter used)
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# Actuator — health probes for Kubernetes liveness/readiness
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
      datadog:
        api-key: ${DATADOG_API_KEY:}
        enabled: ${DATADOG_ENABLED:false}
    tags:
      application: scm-backend
      environment: ${SPRING_PROFILES_ACTIVE:local}

# SCM custom JWT settings (used by JwtTokenProvider)
scm:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
      issuer: ${JWT_ISSUER:scm-platform}
    cors:
      allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  kafka:
    topics:
      inventory-updates: scm.inventory.updates
      order-events: scm.order.events
      supplier-events: scm.supplier.events
      shipment-tracking: scm.shipment.tracking

# Logging — JSON format with correlation IDs for distributed tracing
logging:
  level:
    com.scm: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: >-
      {"ts":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}","level":"%-5level",
      "logger":"%logger{36}","thread":"%thread",
      "correlationId":"%X{correlationId:-none}",
      "msg":"%replace(%msg%n%xException){'\n','\\n'}"}%n

# Server
server:
  port: 8080
  shutdown: graceful

