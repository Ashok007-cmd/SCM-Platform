name: Continuous Deployment — GitOps Image Update

on:
  workflow_run:
    workflows:
      - "Backend CI — Build, Test & Push"
      - "Frontend CI — Build, Test & Push"
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  update-manifests:
    name: Update Kubernetes Image Tags
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: production

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          fi

      - name: Update backend image tag
        run: |
          sed -i "s|image: .*/scm-backend:.*|image: ${{ env.DOCKERHUB_USERNAME }}/scm-backend:${{ env.IMAGE_TAG }}|g" \
            kubernetes-manifests/backend/deployment.yaml

      - name: Update AI/ML image tag
        run: |
          sed -i "s|image: .*/scm-ai-ml:.*|image: ${{ env.DOCKERHUB_USERNAME }}/scm-ai-ml:${{ env.IMAGE_TAG }}|g" \
            kubernetes-manifests/ai-ml/deployment.yaml

      - name: Update frontend image tag
        run: |
          sed -i "s|image: .*/scm-frontend:.*|image: ${{ env.DOCKERHUB_USERNAME }}/scm-frontend:${{ env.IMAGE_TAG }}|g" \
            kubernetes-manifests/frontend/deployment.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes-manifests/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(deploy): update image tags to ${{ env.IMAGE_TAG }} [skip ci]"
          git push

      - name: ArgoCD sync status
        run: |
          echo "Manifests updated. ArgoCD will automatically detect the change"
          echo "and perform a rolling update. Monitor at your ArgoCD UI."
          echo "Image tag deployed: ${{ env.IMAGE_TAG }}"
