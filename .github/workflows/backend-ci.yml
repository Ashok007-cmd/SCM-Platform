name: Backend CI - Build, Test & Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-ci:
    name: Backend Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Run Spring Boot Unit Tests
        run: mvn test --no-transfer-progress
        working-directory: ./backend/spring-services

      - name: Install Python Dependencies
        run: pip install -r requirements.txt
        working-directory: ./backend/ai-ml-services

      - name: Run Python Tests
        run: pytest --tb=short
        working-directory: ./backend/ai-ml-services

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java, python

      - name: Run CodeQL Security Scan
        uses: github/codeql-action/analyze@v3
        with:
          languages: java, python

      - name: Build Backend Docker Image (local, for scanning)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: scm-backend:scan

      - name: Scan Backend Image for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scm-backend:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Backend Docker Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scm-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/scm-backend:latest
