apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scm-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: scm-platform
    app.kubernetes.io/part-of: scm-platform
spec:
  project: default

  source:
    repoURL: https://github.com/Ashok007-cmd/SCM-Platform.git
    targetRevision: main
    path: kubernetes-manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: scm-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
